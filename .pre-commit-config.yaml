repos:
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.8.0
    hooks:
      - id: shellcheck
        files: '\.sh$'
  - repo: local
    hooks:
      - id: kali-hardening-static-security-checks
        name: Kali hardening repo static security checks
        entry: bash tests/run_static_security_checks.sh
        language: system
        pass_filenames: false
        always_run: true
